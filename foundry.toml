[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
arbitrum_testnet = "${ARBITRUM_TESTNET_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}" }
